<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HiFive · 5 Pillars</title>

    <!-- ✅ Updated favicon — pentagon constellation (dark background, visible in tabs) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2318140F'/%3E%3Cpolygon points='16,6 25.5,12.9 21.9,24.1 10.1,24.1 6.5,12.9' stroke='%23B07D2E' stroke-width='1.2' fill='none'/%3E%3Cline x1='16' y1='16' x2='16' y2='6' stroke='%23B07D2E' stroke-width='0.5' opacity='0.4'/%3E%3Cline x1='16' y1='16' x2='25.5' y2='12.9' stroke='%23B07D2E' stroke-width='0.5' opacity='0.4'/%3E%3Cline x1='16' y1='16' x2='21.9' y2='24.1' stroke='%23B07D2E' stroke-width='0.5' opacity='0.4'/%3E%3Cline x1='16' y1='16' x2='10.1' y2='24.1' stroke='%23B07D2E' stroke-width='0.5' opacity='0.4'/%3E%3Cline x1='16' y1='16' x2='6.5' y2='12.9' stroke='%23B07D2E' stroke-width='0.5' opacity='0.4'/%3E%3Ccircle cx='16' cy='6' r='2' fill='%23B07D2E'/%3E%3Ccircle cx='25.5' cy='12.9' r='2' fill='%23B07D2E'/%3E%3Ccircle cx='21.9' cy='24.1' r='2' fill='%23B07D2E'/%3E%3Ccircle cx='10.1' cy='24.1' r='2' fill='%23B07D2E'/%3E%3Ccircle cx='6.5' cy='12.9' r='2' fill='%23B07D2E'/%3E%3Ccircle cx='16' cy='16' r='1.5' fill='%23B07D2E' opacity='0.6'/%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f2ede6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Geist', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        #splash-wrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2ede6;
            transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 1;
            transform: scale(1);
        }
        #splash-wrapper.fade-out {
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
        }

        #pillar-canvas {
            background: #f2ede6;
            border-radius: 24px;
            display: block;
            width: 100%;
            max-width: 580px;
            height: auto;
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.03);
        }

        @keyframes dash-in {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes node-pop {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
            70% {
                transform: scale(1.06) rotate(1deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        @keyframes label-fade {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes center-bloom {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.06) rotate(2deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        @keyframes line-draw {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes orbit-rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes pulse-ring {
            0% {
                r: 28;
                opacity: 0.45;
                stroke-width: 1.2;
            }
            100% {
                r: 42;
                opacity: 0;
                stroke-width: 0.4;
            }
        }

        .edge {
            fill: none;
            stroke: #c9b69a;
            stroke-width: 1.2;
            stroke-linecap: round;
        }
        .spoke {
            fill: none;
            stroke: #c9b69a;
            stroke-width: 0.5;
            opacity: 0.18;
            stroke-linecap: round;
        }

        .node-hex {
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 2;
            will-change: transform;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.05));
            backface-visibility: hidden;
            pointer-events: none;
        }

        .node-label-main {
            font-family: 'Geist', sans-serif;
            font-size: 11px;
            font-weight: 600;
            fill: #ffffff;
            text-anchor: middle;
            dominant-baseline: central;
            letter-spacing: 0.04em;
            pointer-events: none;
        }
        .node-desc {
            font-family: 'Geist', sans-serif;
            font-size: 7.5px;
            font-weight: 400;
            fill: rgba(255, 255, 255, 0.7);
            text-anchor: middle;
            letter-spacing: 0.06em;
            pointer-events: none;
        }

        .center-pent-bg {
            fill: #ffffff;
            stroke: #d4c5b0;
            stroke-width: 2;
        }
        .center-pent-inner {
            fill: none;
            stroke: rgba(180, 160, 140, 0.25);
            stroke-width: 0.8;
        }
        .center-gem {
            fill: #c4b09a;
            opacity: 0.45;
        }

        .tagline-text {
            font-family: 'Geist', sans-serif;
            font-size: 8.5px;
            font-weight: 400;
            fill: #b8a48c;
            letter-spacing: 0.12em;
            opacity: 0;
            animation: label-fade 0.9s ease forwards;
            animation-delay: 3s;
        }

        .orbit-dot {
            fill: #d4c5b0;
            opacity: 0.3;
        }
        .bg-ring {
            fill: none;
            stroke: #d4c5b0;
            opacity: 0.07;
        }

        /* Loading progress ring at bottom */
        .loading-bar-wrap {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: label-fade 0.6s ease forwards;
            animation-delay: 2.8s;
        }
        .loading-bar-track {
            width: 160px;
            height: 2px;
            background: rgba(201, 182, 154, 0.25);
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b07d2e, #c99140);
            border-radius: 2px;
            transition: width 0.15s linear;
        }
        .loading-label {
            font-family: 'Geist', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: #b8a48c;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>

    <!-- SPLASH WRAPPER -->
    <div id="splash-wrapper">
        <svg id="pillar-canvas" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">

            <rect width="560" height="560" fill="#f2ede6" rx="16" />

            <g id="bg-rings">
                <circle cx="280" cy="280" r="180" class="bg-ring" stroke-width="0.6" />
                <circle cx="280" cy="280" r="138" class="bg-ring" stroke-width="0.5" />
                <circle cx="280" cy="280" r="76" class="bg-ring" stroke-width="0.5" />
            </g>

            <g id="spokes"></g>
            <g id="edges"></g>
            <g id="nodes"></g>
            <g id="center-group" style="opacity:0"></g>
            <g id="orbit-g" style="transform-origin:280px 280px; opacity:0; animation:orbit-rotate 20s linear infinite; animation-delay:2.6s;"></g>

            <text x="280" y="470" class="tagline-text" text-anchor="middle">
                people infrastructure · ai-native · fractional
            </text>

        </svg>
    </div>

    <!-- Loading bar -->
    <div class="loading-bar-wrap" id="loadingBarWrap">
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loadingFill"></div>
        </div>
        <span class="loading-label">loading experience …</span>
    </div>

    <script>
        (function() {
            const CX = 280,
                CY = 280,
                R_OUTER = 160,
                R_NODE = 34,
                R_CENTER = 28;

            const pillarColors = [
                { bg: '#c76b4a', label: 'Hire' },
                { bg: '#4a7b7a', label: 'Comply' },
                { bg: '#b58b5a', label: 'Build' },
                { bg: '#8a6e8a', label: 'Retain' },
                { bg: '#5f7a6a', label: 'Scale' }
            ];

            const pillars = [{
                id: 'hire',
                label: 'Hire',
                sub: 'recruitment'
            }, {
                id: 'comply',
                label: 'Comply',
                sub: 'governance'
            }, {
                id: 'build',
                label: 'Build',
                sub: 'infrastructure'
            }, {
                id: 'retain',
                label: 'Retain',
                sub: 'performance'
            }, {
                id: 'scale',
                label: 'Scale',
                sub: 'global growth'
            }];

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.getElementById('pillar-canvas');

            function angle(i) {
                return (Math.PI * 2 * i / 5) - Math.PI / 2;
            }

            function nodePos(i) {
                return {
                    x: CX + R_OUTER * Math.cos(angle(i)),
                    y: CY + R_OUTER * Math.sin(angle(i))
                };
            }

            function hexPoints(cx, cy, r) {
                const pts = [];
                for (let i = 0; i < 6; i++) {
                    const a = Math.PI / 6 + i * Math.PI / 3;
                    pts.push((cx + r * Math.cos(a)).toFixed(2) + ',' + (cy + r * Math.sin(a)).toFixed(2));
                }
                return pts.join(' ');
            }

            function pentagonPoints(cx, cy, r) {
                const pts = [];
                for (let i = 0; i < 5; i++) {
                    const a = -Math.PI / 2 + i * 2 * Math.PI / 5;
                    pts.push((cx + r * Math.cos(a)).toFixed(2) + ',' + (cy + r * Math.sin(a)).toFixed(2));
                }
                return pts.join(' ');
            }

            function makeSVGEl(tag, attrs) {
                const el = document.createElementNS(svgNS, tag);
                for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
                return el;
            }

            const positions = pillars.map((_, i) => nodePos(i));

            function drawEdges() {
                const g = document.getElementById('edges');
                for (let i = 0; i < 5; i++) {
                    const a = positions[i],
                        b = positions[(i + 1) % 5];
                    const len = Math.hypot(b.x - a.x, b.y - a.y);
                    const line = makeSVGEl('line', {
                        x1: a.x,
                        y1: a.y,
                        x2: b.x,
                        y2: b.y,
                        class: 'edge',
                        'stroke-dasharray': len,
                        'stroke-dashoffset': len,
                        style: `animation: line-draw 0.7s ease forwards; animation-delay: ${0.3 + i * 0.12}s`
                    });
                    g.appendChild(line);
                }
            }

            function drawSpokes() {
                const g = document.getElementById('spokes');
                positions.forEach((p, i) => {
                    const len = Math.hypot(p.x - CX, p.y - CY);
                    const line = makeSVGEl('line', {
                        x1: CX,
                        y1: CY,
                        x2: p.x,
                        y2: p.y,
                        class: 'spoke',
                        'stroke-dasharray': len,
                        'stroke-dashoffset': len,
                        style: `animation: line-draw 0.6s ease forwards; animation-delay: ${0.9 + i * 0.1}s`
                    });
                    g.appendChild(line);
                });
            }

            function drawNodes() {
                const g = document.getElementById('nodes');
                pillars.forEach((p, i) => {
                    const pos = positions[i];
                    const color = pillarColors[i].bg;
                    const cx = pos.x,
                        cy = pos.y;

                    const grp = makeSVGEl('g', {
                        id: 'node-' + i,
                        style: `transform-origin: ${cx}px ${cy}px; transform: scale(0); opacity: 0; animation: node-pop 0.55s cubic-bezier(.34,1.56,.64,1) forwards; animation-delay: ${1.4 + i * 0.15}s;`
                    });

                    const hex = makeSVGEl('polygon', {
                        points: hexPoints(cx, cy, R_NODE),
                        class: 'node-hex',
                        id: 'hex-' + i,
                        fill: color,
                        'data-color': color,
                        style: `transform-origin: ${cx}px ${cy}px; transform: scale(1);`
                    });
                    grp.appendChild(hex);

                    const lbl = makeSVGEl('text', {
                        x: cx,
                        y: cy - 3,
                        class: 'node-label-main',
                        id: 'lbl-' + i
                    });
                    lbl.textContent = p.label;
                    grp.appendChild(lbl);

                    const sub = makeSVGEl('text', {
                        x: cx,
                        y: cy + 10,
                        class: 'node-desc',
                        id: 'sub-' + i
                    });
                    sub.textContent = p.sub;
                    grp.appendChild(sub);

                    g.appendChild(grp);
                });
            }

            function drawCenter() {
                const g = document.getElementById('center-group');
                g.style.cssText =
                    `transform-origin: ${CX}px ${CY}px; animation: center-bloom 0.7s cubic-bezier(.34,1.56,.64,1) forwards; animation-delay: 2.2s; opacity: 0;`;

                const bg = makeSVGEl('polygon', {
                    points: pentagonPoints(CX, CY, R_CENTER),
                    class: 'center-pent-bg'
                });
                g.appendChild(bg);

                const inner = makeSVGEl('polygon', {
                    points: pentagonPoints(CX, CY, R_CENTER - 6),
                    class: 'center-pent-inner'
                });
                g.appendChild(inner);

                const gem = makeSVGEl('polygon', {
                    points: [
                        [CX, CY - 5],
                        [CX + 5, CY],
                        [CX, CY + 5],
                        [CX - 5, CY]
                    ].map(p => p.join(',')).join(' '),
                    class: 'center-gem'
                });
                g.appendChild(gem);

                const pulse = makeSVGEl('circle', {
                    cx: CX,
                    cy: CY,
                    r: R_CENTER + 2,
                    fill: 'none',
                    stroke: '#d4c5b0',
                    strokeWidth: '0.8',
                    opacity: '0.2',
                    style: `animation: pulse-ring 3s ease-out infinite;`
                });
                g.appendChild(pulse);
            }

            function addOrbitDots() {
                const g = document.getElementById('orbit-g');
                setTimeout(() => { g.style.opacity = '0.3'; }, 2700);

                for (let i = 0; i < 5; i++) {
                    const a = angle(i) + Math.PI / 10;
                    const r = R_OUTER - R_NODE - 12;
                    const x = CX + r * Math.cos(a);
                    const y = CY + r * Math.sin(a);
                    const dot = makeSVGEl('circle', {
                        cx: x,
                        cy: y,
                        r: 2.2,
                        class: 'orbit-dot'
                    });
                    g.appendChild(dot);
                }
            }

            drawEdges();
            drawSpokes();
            drawNodes();
            drawCenter();
            addOrbitDots();

            // ── Progress bar & transition ──
            const splash = document.getElementById('splash-wrapper');
            const fill = document.getElementById('loadingFill');
            let progress = 0;
            const duration = 4200; // total splash duration in ms
            const startTime = performance.now();

            function updateProgress() {
                const elapsed = performance.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                fill.style.width = (eased * 100) + '%';

                if (progress < 1) {
                    requestAnimationFrame(updateProgress);
                } else {
                    // Complete → fade out splash
                    setTimeout(() => {
                        splash.classList.add('fade-out');
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 900);
                    }, 200);
                }
            }

            // start progress after a small delay so everything renders
            setTimeout(updateProgress, 300);

        })();
    </script>

</body>
</html>
